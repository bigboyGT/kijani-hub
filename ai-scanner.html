<head>
    <link rel="stylesheet" href="css/main.css">
    <!-- Optional: Link modal-specific CSS if in separate file -->
    <link rel="stylesheet" href="css/modal.css">
</head>

<!-- Modal for AI Image Scanner -->
<div id="aiImageScannerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>AI Image Scanner</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="imageFile" name="file" accept="image/*">
            <button type="submit">Scan Image</button>
        </form>
        <div id="scanResult"></div>
    </div>
</div>

<body>
    <!-- Other content here... -->

    <!-- Link main JavaScript file -->
    <script src="js/main.js"></script>

    <!-- Link AI Image Scanner JavaScript (if separate) -->
    <script src="js/ai-scanner.js"></script>
</body>
